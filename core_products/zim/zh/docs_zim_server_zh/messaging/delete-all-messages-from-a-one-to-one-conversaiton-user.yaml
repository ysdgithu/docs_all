paths:
  /:
    post:
      tags:
        - Messaging
      summary: 删除指定单聊用户全部消息
      description: |
        调用此接口，您可以在服务端删除单聊会话中某一用户的全部消息。

        <Note title="调用频率限制">20  次/秒。</Note>

      operationId: delete-all-messages-from-a-one-to-one-conversaiton-user
      parameters:
        - name: Action
          in: query
          required: true
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im?Action=ClearPeerMessage
          schema:
            type: string
            enum: ["ClearPeerMessage"]
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAllMessagesFromAOneToOneConversaitonUserRequest'
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAllMessagesFromAOneToOneConversaitonUserResponse'

