openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    email: support@zegocloud.com

servers:
  - url: https://zim-api.zego.im
    description: ZIM 服务端 API 地址

tags:
  - name: Messaging
    description: 消息管理相关接口

paths:
  /:
    post:
      tags:
        - Messaging
      summary: 发送群组消息
      description: |
        发送群组消息，并推送给群组内的所有在线用户。

        客户端将通过 ZIM SDK 的回调接口，接收群组消息的通知。

        <MessageModerationNote />

        <Note title="调用频率限制">10 次/秒。</Note>

      operationId: send-group-messages
      parameters:
        - name: Action
          in: query
          required: true
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im?Action=SendGroupMessage
          schema:
            type: string
            enum: ["SendGroupMessage"]
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendGroupMessagesRequest'
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendGroupMessagesResponse'

components:
  schemas:
    SendGroupMessagesRequest:
      type: object
      properties:
        # TODO: 根据具体接口定义请求参数
        placeholder:
          type: string
          description: 占位符，需要根据实际接口定义

    SendGroupMessagesResponse:
      allOf:
        - $ref: '../shared-components.yaml#/components/schemas/StandardResponse'
        - type: object
          properties:
            # TODO: 根据具体接口定义响应数据
            Data:
              type: object
              description: 响应数据，需要根据实际接口定义
