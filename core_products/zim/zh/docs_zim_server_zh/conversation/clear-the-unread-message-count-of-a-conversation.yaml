openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    email: support@zegocloud.com

servers:
  - url: https://zim-api.zego.im
    description: ZIM 服务端 API 地址

tags:
  - name: Conversation
    description: 会话管理相关接口

paths:
  /:
    get:
      tags:
        - Conversation
      summary: 清除单个会话消息未读数
      description: |
        本接口可为指定用户清除指定会话的消息未读数。

        <Note title="说明">本接口默认仅适用于用户最新的 1000 个会话。如需适用于更多会话，请联系 ZEGO 技术支持。</Note>

        客户端将通过 ZIM SDK 的回调接口，接收会话的未读数变化。

        <Note title="调用频率限制">20 次/秒。</Note>

      operationId: clear-the-unread-message-count-of-a-conversation
      parameters:
        - name: Action
          in: query
          required: true
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im?Action=ClearConversationUnread
          schema:
            type: string
            enum: ["ClearConversationUnread"]
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'

      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClearTheUnreadMessageCountOfAConversationResponse'

components:
  schemas:
    ClearTheUnreadMessageCountOfAConversationRequest:
      type: object
      properties:
        # TODO: 根据具体接口定义请求参数
        placeholder:
          type: string
          description: 占位符，需要根据实际接口定义

    ClearTheUnreadMessageCountOfAConversationResponse:
      allOf:
        - $ref: '../shared-components.yaml#/components/schemas/StandardResponse'
        - type: object
          properties:
            # TODO: 根据具体接口定义响应数据
            Data:
              type: object
              description: 响应数据，需要根据实际接口定义
