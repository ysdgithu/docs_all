openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    email: support@zegocloud.com

servers:
  - url: https://zim-api.zego.im
    description: ZIM 服务端 API 地址

tags:
  - name: Conversation
    description: 会话管理相关接口

paths:
  /:
    post:
      tags:
        - Conversation
      summary: 查询单聊会话消息列表
      description: |
        调用此接口，分页拉取指定用户的某个单聊会话的消息列表。

        <Note title="调用频率限制">20 次/秒。</Note>

      operationId: query-the-message-list-of-one-on-one-chats
      parameters:
        - name: Action
          in: query
          required: true
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im?Action=QueryPeerMsg
          schema:
            type: string
            enum: ["QueryPeerMsg"]
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryTheMessageListOfOneOnOneChatsRequest'
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryTheMessageListOfOneOnOneChatsResponse'

components:
  schemas:
    QueryTheMessageListOfOneOnOneChatsRequest:
      type: object
      properties:
        # TODO: 根据具体接口定义请求参数
        placeholder:
          type: string
          description: 占位符，需要根据实际接口定义

    QueryTheMessageListOfOneOnOneChatsResponse:
      allOf:
        - $ref: '../shared-components.yaml#/components/schemas/StandardResponse'
        - type: object
          properties:
            # TODO: 根据具体接口定义响应数据
            Data:
              type: object
              description: 响应数据，需要根据实际接口定义
