openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    email: support@zegocloud.com

servers:
  $ref: '../shared-components.yaml#/servers'

tags:
  - name: User
    description: 用户管理相关接口

paths:
  /:
    get:
      tags:
        - User
      summary: 查询好友列表
      description: |
        根据用户 ID 分页拉取其好友列表，获取备注、好友关系建立时间等信息。
        
        调用频率限制：20 次/秒。
      operationId: query-the-friend-list
      parameters:
        - name: Action
          in: query
          required: true
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im?Action=QueryFriendList
          schema:
            type: string
            enum: ["QueryFriendList"]
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        - $ref: '../shared-components.yaml#/components/parameters/IsTest'
        - name: FromUserId
          in: query
          required: true
          description: 查询此 UserID 的好友列表。
          schema:
            type: string
            example: "zego"
        - name: Limit
          in: query
          required: true
          description: 单次拉取多少名好友的信息。取值范围为 [0, 100]。如果不填或数值为 0、大于 100，取值为 100。
          schema:
            type: integer
            minimum: 0
            maximum: 100
            default: 100
            example: 100
        - name: Next
          in: query
          required: true
          description: |
            分页拉取标志，第一次填 0，之后填上一次返回的 Next 值。当返回的 Next 为 0 时，代表好友列表获取完毕。
          schema:
            type: integer
            format: int64
            example: 2
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryFriendListResponse'
              example:
                Code: 0
                Message: "success"
                RequestId: "343649807833778782"
                Next: 0
                FriendList:
                  - UserId: "friend123"
                    FriendAlias: "好友备注"
                    FriendTime: 1640995200000
                    Attributes:
                      - Key: "k1"
                        Value: "value1"

components:
  schemas:
    QueryFriendListResponse:
      allOf:
        - $ref: '../shared-components.yaml#/components/schemas/StandardResponse'
        - type: object
          properties:
            Next:
              type: integer
              format: int64
              description: 分页拉取标志，当为 0 时表示好友列表获取完毕。
              example: 0
            FriendList:
              type: array
              description: 好友列表
              items:
                type: object
                properties:
                  UserId:
                    type: string
                    description: 好友的用户 ID
                    example: "friend123"
                  FriendAlias:
                    type: string
                    description: 好友备注
                    example: "好友备注"
                  FriendTime:
                    type: integer
                    format: int64
                    description: 成为好友的时间戳（毫秒）
                    example: 1640995200000
                  Attributes:
                    type: array
                    description: 好友属性
                    items:
                      type: object
                      properties:
                        Key:
                          type: string
                          description: 属性键
                          example: "k1"
                        Value:
                          type: string
                          description: 属性值
                          example: "value1"
