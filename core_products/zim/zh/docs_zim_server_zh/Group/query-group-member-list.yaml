      summary: 查询群成员列表
      description: |
        根据群组 ID 获取群组中的用户列表。

<Note title="说明">

群组 ID 可通过 [查询 App 下的群组列表](./query-group-list-in-the-app.mdx) 获取。
</Note>

        <Note title="调用频率限制">20  次/秒。</Note>

        以下请求参数列表仅列出了接口请求参数和部分公共参数，完整公共参数列表请参考 [调用方式 - 公共请求参数](../accessing-server-apis.mdx#2-公共参数)。
      operationId: query-group-member-list
      parameters:
        - name: Action
          in: query
          required: true
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im?Action=QueryGroupMemberList
