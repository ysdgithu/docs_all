openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    email: support@zegocloud.com

servers:
  - url: https://zim-api.zego.im
    description: ZIM 服务端 API 地址

tags:
  - name: Group
    description: 群组管理相关接口

paths:
  /:
    post:
      tags:
        - Group
      summary: 创建群组
      description: |
        通过此接口创建群组。

        创建群组成功，群主会收到群组创建成功的通知，其他群成员会收到加入群组的通知。

        <Note title="调用频率限制">20 次/秒。</Note>

        以下请求参数列表仅列出了接口请求参数和部分公共参数，完整公共参数列表请参考 [调用方式 - 公共请求参数](../Accessing%20Server%20APIs.mdx#2-公共参数)。

        <Note title="说明">
        以下 `GroupOwner` 和 `UserId` 对应的用户已在客户端调用 `login` 方法登录 ZIM 服务，或开发者已调用 [服务端 API](./../User/Batch%20register%20users.mdx) 注册相关的 userID。
        </Note>
      operationId: create-a-group
      parameters:
        - name: Action
          in: query
          required: true
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im?Action=CreateGroup
          schema:
            type: string
            enum: ["CreateGroup"]
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        - $ref: '../shared-components.yaml#/components/parameters/IsTest'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateGroupResponse'

components:
  schemas:
    CreateGroupRequest:
      type: object
      required:
        - GroupOwner
      properties:
        GroupId:
          type: string
          description: 群 ID，群的唯一标识，不能以","开头。长度上限为 32 字节。
          maxLength: 32
          example: "group123"
        GroupName:
          type: string
          description: 群名称，长度上限为 50 字节。
          maxLength: 50
          example: "测试群组"
        GroupNotice:
          type: string
          description: 群公告，长度上限为 300 字节。
          maxLength: 300
          example: "这是一个测试群组"
        GroupAvatar:
          type: string
          description: 群头像 URL，长度上限为 500 字节。
          maxLength: 500
          example: "https://example.com/group_avatar.jpg"
        GroupOwner:
          type: string
          description: 群主的用户 ID。长度上限为 32 字节。
          maxLength: 32
          example: "owner123"
        UserId:
          type: array
          description: 需要入群用户的 ID。默认支持一次性最多添加 100 名用户。
          maxItems: 100
          items:
            type: string
            maxLength: 32
            example: "user1"
        Attributes:
          type: array
          description: 群属性。群属性上限为 10 个。
          maxItems: 10
          items:
            type: object
            required:
              - Key
              - Value
            properties:
              Key:
                type: string
                description: 群属性的键，长度上限为 16 个字节。
                maxLength: 16
                example: "type"
              Value:
                type: string
                description: 群属性的值，长度上限为 1024 个字节。
                maxLength: 1024
                example: "study"

    CreateGroupResponse:
      allOf:
        - $ref: '../shared-components.yaml#/components/schemas/StandardResponse'
        - type: object
          properties:
            GroupId:
              type: string
              description: 创建的群组 ID
              example: "group123"
            CreateGroupTime:
              type: integer
              format: int64
              description: 群组创建时间戳（毫秒）
              example: 1640995200000
            ErrorList:
              type: array
              description: 失败信息列表
              items:
                type: object
                properties:
                  UserId:
                    type: string
                    description: 操作失败的用户 ID
                    example: "user123"
                  SubCode:
                    type: integer
                    description: 具体的错误码
                    example: 660000012
                  SubMessage:
                    type: string
                    description: 错误说明
                    example: "user length limit"
