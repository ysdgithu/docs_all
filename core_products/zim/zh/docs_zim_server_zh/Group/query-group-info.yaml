openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    email: support@zegocloud.com

servers:
  - url: https://zim-api.zego.im
    description: ZIM 服务端 API 地址

tags:
  - name: Group
    description: 群组管理相关接口

paths:
  /:
    post:
      tags:
        - Group
      summary: 查询群组资料
      description: |
        通过该接口查询群资料，包含群组名称、群组公告、群组头像、群组禁言信息、群组规格限制、群组创建时间和群组属性。

        <Note title="调用频率限制">20 次/秒。</Note>
      operationId: query-group-info
      parameters:
        - name: Action
          in: query
          required: true
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im?Action=QueryGroupInfo
          schema:
            type: string
            enum: ["QueryGroupInfo"]
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryGroupInfoRequest'
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryGroupInfoResponse'

components:
  schemas:
    QueryGroupInfoRequest:
      type: object
      required:
        - FromUserId
        - GroupId
      properties:
        FromUserId:
          type: string
          description: 查询者的用户 ID（已在客户端调用 `login` 方法登录 ZIM 服务，或已调用服务端 API 完成注册）。
          maxLength: 32
          example: "user123"
        GroupId:
          type: string
          description: 查询目标的群组 ID。
          maxLength: 32
          example: "group123"

    QueryGroupInfoResponse:
      allOf:
        - $ref: '../shared-components.yaml#/components/schemas/StandardResponse'
        - type: object
          properties:
            GroupName:
              type: string
              description: 群组名称
              example: "测试群组"
            GroupNotice:
              type: string
              description: 群组公告
              example: "这是群组公告"
            GroupDataSeq:
              type: integer
              description: 群组资料修改次数
              example: 1
            GroupAvatar:
              type: string
              description: 群组头像地址
              example: "https://example.com/avatar.jpg"
            IsAllForbid:
              type: boolean
              description: |
                是否全员禁言。
                - true：是
                - false：否
              example: false
            ForbidList:
              type: array
              description: |
                被禁言的群组角色。
                - 1：群主
                - 2：群管理员
                - 3：群成员
                - 其他值：您自定义的群组角色，一般建议大于 100
              items:
                type: integer
                example: 2
            LimitInfo:
              type: object
              description: 群组规格限制
              properties:
                MemberCountLimit:
                  type: integer
                  description: 群组成员人数上限
                  example: 100
                JoinMode:
                  type: integer
                  description: |
                    加入群组的模式：
                    - 0：无需验证，任何人可以直接加入群组
                    - 1：用户需发起入群申请，群主或群管理员批准后，该用户才能加入群组
                    - 2：外部用户需经群内成员邀请方可入群
                  enum: [0, 1, 2]
                  example: 1
                InviteMode:
                  type: integer
                  description: |
                    邀请模式：
                    - 0：所有群成员都能邀请外部用户入群
                    - 1：只有群主或者群管理员可以发起邀请
                  enum: [0, 1]
                  example: 1
                BeInvitedMode:
                  type: integer
                  description: |
                    受邀请模式：
                    - 0：可以直接邀请外部用户入群，无需对方同意
                    - 1：邀请某人加入群组后，需要对方同意
                  enum: [0, 1]
                  example: 1
                NumberMessage:
                  type: integer
                  description: 新成员入群后可拉取的历史消息数目
                  example: 100
            ForbidExpireTime:
              type: integer
              format: int64
              description: 禁言结束的 Unix 时间戳，单位为毫秒（ms）
              example: 1640995200000
            GroupCreateTime:
              type: integer
              format: int64
              description: 群组创建的 Unix 时间戳，单位为毫秒（ms）
              example: 1640995200000
            GroupId:
              type: string
              description: 群组 ID
              example: "group123"
            GroupAttributes:
              type: array
              description: 群组属性列表
              items:
                type: object
                properties:
                  Key:
                    type: string
                    description: 群组属性的键
                    example: "type"
                  Value:
                    type: string
                    description: 群组属性的值
                    example: "study"
