openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    email: support@zegocloud.com

servers:
  - url: https://zim-api.zego.im
    description: ZIM 服务端 API 地址

tags:
  - name: User
    description: 用户管理相关接口

paths:
  /:
    get:
      tags:
        - User
      summary: 查询用户在线状态
      description: |
        查询用户的在线状态，支持查询单个用户、或批量查询多个用户的在线状态。

        <Note title="调用频率限制">20 次/秒。</Note>

        以下请求参数列表仅列出了接口请求参数和部分公共参数，完整公共参数列表请参考 [调用方式 - 公共请求参数](../accessing-server-apis.mdx#2-公共参数)。

      operationId: query-users-online-status
      parameters:
        - name: Action
          in: query
          required: true
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im?Action=QueryUserOnlineState
          schema:
            type: string
            enum: ["QueryUserOnlineState"]
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        - $ref: '../shared-components.yaml#/components/parameters/IsTest'
        - name: UserId
          in: query
          required: true
          description: 需要查询的用户 ID 列表，最大支持查询 100 个用户 ID。示例：UserId[]=a&UserId[]=b
          style: form
          explode: true
          schema:
            type: array
            maxItems: 100
            items:
              type: string
              maxLength: 64
              example: "user123"
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryUsersOnlineStatusResponse'

components:
  schemas:
    QueryUsersOnlineStatusResponse:
      allOf:
        - $ref: '../shared-components.yaml#/components/schemas/StandardResponse'
        - type: object
          properties:
            Result:
              type: array
              description: 查询成功结果
              items:
                type: object
                properties:
                  UserId:
                    type: string
                    description: 用户 ID
                    example: "user123"
                  OnlineState:
                    type: integer
                    description: |
                      在线状态：
                      - 0：离线
                      - 1：在线
                    enum: [0, 1]
                    example: 1
            ErrorList:
              type: array
              description: 查询失败列表
              items:
                type: object
                properties:
                  UserId:
                    type: string
                    description: 查询失败的用户 ID
                    example: "user456"
                  SubCode:
                    type: integer
                    description: 查询失败的具体返回码
                    example: 660500002
                  SubMessage:
                    type: string
                    description: 查询失败的原因说明
                    example: "user not found"
