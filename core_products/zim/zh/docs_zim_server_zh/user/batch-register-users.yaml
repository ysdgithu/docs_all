openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    email: support@zegocloud.com

servers:
  - url: https://zim-api.zego.im
    description: ZIM 服务端 API 地址

tags:
  - name: User
    description: 用户管理相关接口

paths:
  /:
    post:
      tags:
        - User
      summary: 批量注册用户
      description: |
        后端注册，开发者可以通过该接口批量帮用户注册 IM 账号，实现消息的接收，以便在用户登录 ZIM 后接收历史消息，常用于教育场景。

        <Note title="调用频率限制">20 次/秒。</Note>

        <Note title="说明">
        UserID 仅支持数字，英文字符和 {"'!', '#', '$', '%', '&', '(', ')', '+', '-', ':', ';', '<', '=', '.', '>', '?', '@', '[', ']', '^', '_', '{', '}', '|', '~'}。
        </Note>
      operationId: batch-register-users
      parameters:
        - name: Action
          in: query
          required: true
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im?Action=UserRegister
          schema:
            type: string
            enum: ["UserRegister"]
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRegisterUsersRequest'
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchRegisterUsersResponse'

components:
  schemas:
    BatchRegisterUsersRequest:
      type: object
      required:
        - UserInfo
      properties:
        UserInfo:
          type: array
          description: 用户信息，单次最多注册 100 个用户。
          maxItems: 100
          items:
            type: object
            required:
              - UserId
            properties:
              UserId:
                type: string
                description: 用户 ID，长度不超过 32 字节。
                maxLength: 32
                example: "user123"
              UserName:
                type: string
                description: 用户名称，长度不超过 256 字节。
                maxLength: 256
                example: "张三"
              UserAvatar:
                type: string
                description: 用户头像地址，长度不超过 500 字节。
                maxLength: 500
                example: "https://example.com/avatar.jpg"

    BatchRegisterUsersResponse:
      allOf:
        - $ref: '../shared-components.yaml#/components/schemas/StandardResponse'
        - type: object
          properties:
            ErrorList:
              type: array
              description: |
                失败信息列表。
                - Code 为 0：
                  - ErrorList 为空，全部用户注册成功。
                  - ErrorList 不为空，表示部分用户注册失败，请参考 SubCode、SubMessage 处理。
                - Code 不为 0：
                  - ErrorList 为空，表示参数错误、接口频率限制、系统错误。
                  - ErrorList 不为空，表示所有用户都注册失败，全部都是已经存在的用户。
              items:
                type: object
                properties:
                  UserID:
                    type: string
                    description: 注册失败的 UserID
                    example: "user123"
                  SubCode:
                    type: integer
                    description: 用户注册失败的具体返回码
                    example: 660000001
                  SubMessage:
                    type: string
                    description: 用户注册失败的原因说明
                    example: "user already exists"
