openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    email: support@zegocloud.com

servers:
  - url: https://zim-api.zego.im
    description: ZIM 服务端 API 地址

tags:
  - name: User
    description: 用户管理相关接口

paths:
  /:
    post:
      tags:
        - User
      summary: 查询用户信息
      description: |
        支持通过用户 ID 查询用户的信息，包含用户名称、用户头像和扩展字段。

        <Note title="调用频率限制">20 次/秒。</Note>

        <Note title="说明">
        UserIds 仅支持数字，英文字符和 {"'!'，'#'，'$'，'%'，'&'，'('，')'，'+'，'-'，':'，';'，'<'，'='，'.'，'>'，'?'，'@'，'['，']'，'^'，'_'，' '，'{'，'}'，'|'，'~'}。
        </Note>
      operationId: query-user-information
      parameters:
        - name: Action
          in: query
          required: true
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im?Action=QueryUserInfos
          schema:
            type: string
            enum: ["QueryUserInfos"]
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryUserInformationRequest'
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryUserInformationResponse'

components:
  schemas:
    QueryUserInformationRequest:
      type: object
      required:
        - UserIds
      properties:
        UserIds:
          type: array
          description: 需要查询的用户 ID 列表，最大支持查询 100 个用户 ID。单个用户 ID 不超过 64 字节。
          maxItems: 100
          items:
            type: string
            maxLength: 64
            example: "user123"

    QueryUserInformationResponse:
      allOf:
        - $ref: '../shared-components.yaml#/components/schemas/StandardResponse'
        - type: object
          properties:
            Result:
              type: array
              description: 查询成功结果
              items:
                type: object
                properties:
                  UserId:
                    type: string
                    description: 查询成功的用户 ID
                    example: "user123"
                  UserName:
                    type: string
                    description: 用户名称
                    example: "张三"
                  UserAvatar:
                    type: string
                    description: 用户头像地址
                    example: "https://example.com/avatar.jpg"
                  Extra:
                    type: string
                    description: 扩展字段
                    example: "{\"level\": 5}"
            ErrorList:
              type: array
              description: |
                查询失败列表。用户 ID 不存在或者用户未注册时，通过该字段返回。
                - Code 为 0：
                  - ErrorList 为空，全部用户信息查询成功。
                  - ErrorList 不为空，表示部分用户信息查询失败，请参考 SubCode 处理。
                - Code 不为 0：
                  - ErrorList 为空，表示参数错误、接口频率限制、系统错误。
              items:
                type: object
                properties:
                  UserId:
                    type: string
                    description: 查询失败的用户 ID
                    example: "user456"
                  SubCode:
                    type: integer
                    description: 查询失败的具体返回码
                    example: 660500002
                  SubMessage:
                    type: string
                    description: 查询失败的原因说明
                    example: "user not found"
