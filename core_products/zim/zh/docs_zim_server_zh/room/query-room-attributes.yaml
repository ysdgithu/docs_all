openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    email: support@zegocloud.com

servers:
  - url: https://zim-api.zego.im
    description: ZIM 服务端 API 地址

tags:
  - name: Room
    description: 房间管理相关接口

paths:
  /:
    post:
      tags:
        - Room
      summary: 查询房间属性
      description: |
        查询指定房间 ID 的所有房间属性。

        <Note title="调用频率限制"> 20  次/秒。</Note>

      operationId: query-room-attributes
      parameters:
        - name: Action
          in: query
          required: true
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im?Action=QueryRoomAttribute
          schema:
            type: string
            enum: ["QueryRoomAttribute"]
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRoomAttributesRequest'
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryRoomAttributesResponse'

components:
  schemas:
    QueryRoomAttributesRequest:
      type: object
      properties:
        # TODO: 根据具体接口定义请求参数
        placeholder:
          type: string
          description: 占位符，需要根据实际接口定义

    QueryRoomAttributesResponse:
      allOf:
        - $ref: '../shared-components.yaml#/components/schemas/StandardResponse'
        - type: object
          properties:
            # TODO: 根据具体接口定义响应数据
            Data:
              type: object
              description: 响应数据，需要根据实际接口定义
